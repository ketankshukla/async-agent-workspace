name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  # Non-secret placeholders: only needed so build-time module loading of
  # server-only clients (which validate required env vars at import time)
  # doesn't fail. No live credentials are used in CI.
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
  SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
  ANTHROPIC_API_KEY: placeholder-anthropic-key
  ANTHROPIC_MODEL: claude-sonnet-5

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
